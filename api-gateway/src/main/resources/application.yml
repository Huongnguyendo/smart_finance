# Render (and similar) inject PORT; local dev defaults to 8080.
# Bind all interfaces so the platform's port scan sees the listener.
server:
  port: ${PORT:8080}
  address: 0.0.0.0

smartwallet:
  receipts:
    storage-provider: ${STORAGE_PROVIDER:supabase}
    upload-dir: ${SMARTWALLET_RECEIPTS_UPLOAD_DIR:uploads/receipts}
    s3:
      bucket: ${AWS_S3_BUCKET:}
      region: ${AWS_REGION:us-east-1}
      prefix: ${AWS_S3_PREFIX:receipts/}
    supabase:
      url: ${SUPABASE_URL:}
      service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
      bucket: ${SUPABASE_STORAGE_BUCKET:receipts}
      prefix: ${SUPABASE_STORAGE_PREFIX:}
    azure:
      connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
      container: ${AZURE_STORAGE_CONTAINER:receipts}
      prefix: ${AZURE_STORAGE_BLOB_PREFIX:receipts/}

spring:
  application:
    name: smartwallet-ai
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartwallet}
    username: ${DB_USERNAME:smartwallet}
    password: ${DB_PASSWORD:smartwallet}
    driver-class-name: org.postgresql.Driver
    # Supabase Session pooler allows very few clients; use Transaction pooler (port 6543) in DB_URL.
    # On Render, set HIKARI_MAX_POOL_SIZE=3–5 if you still hit limits.
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:2}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  # Without a broker (e.g. Render): set RABBITMQ_ENABLED=false or SPRING_RABBITMQ_ENABLED=false.
  # SmartWalletApplication also excludes Rabbit auto-config when those env vars are false.
  rabbitmq:
    enabled: ${RABBITMQ_ENABLED:${SPRING_RABBITMQ_ENABLED:true}}
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,heapdump
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
    heapdump:
      enabled: true
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317/v1/traces}

# OpenAPI / Swagger UI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

security:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}

# CORS: comma-separated origin patterns. Override with CORS_ALLOWED_ORIGINS env var.
# Default includes localhost + common production hosts (Vercel, Netlify, Expo).
cors:
  allowed-origin-patterns: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*,https://*.vercel.app,https://*.netlify.app,https://*.expo.dev}

# Rate limiting: per-IP, token bucket. Excludes health checks.
rate-limit:
  enabled: ${RATE_LIMIT_ENABLED:true}
  capacity: ${RATE_LIMIT_CAPACITY:100}
  refill-minutes: ${RATE_LIMIT_REFILL_MINUTES:1}
  exclude-paths: ${RATE_LIMIT_EXCLUDE_PATHS:/health,/actuator/health,/actuator/info}

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

---
spring:
  config:
    activate:
      on-profile: test
  jpa:
    show-sql: false
