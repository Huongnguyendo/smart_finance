name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (Java)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn clean test -B

  frontend:
    name: Frontend (Expo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install and build
        run: |
          cd app
          npm ci
          npm run build:web

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smartwallet
          POSTGRES_PASSWORD: smartwallet
          POSTGRES_DB: smartwallet
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Build backend
        run: mvn package -DskipTests -B -pl api-gateway -am

      - name: Start backend
        run: |
          java -jar api-gateway/target/api-gateway-*.jar &
          echo "Waiting for backend..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health > /dev/null; then
              echo "Backend ready"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:8080/health || exit 1
        env:
          DB_URL: jdbc:postgresql://localhost:5432/smartwallet
          DB_USERNAME: smartwallet
          DB_PASSWORD: smartwallet
          RABBITMQ_HOST: localhost
          RABBITMQ_PORT: 5672
          JWT_SECRET: e2e-secret-at-least-32-characters-long
          RATE_LIMIT_ENABLED: false
          TRACING_ENABLED: false
          SMARTWALLET_RECEIPTS_UPLOAD_DIR: /tmp/smartwallet-e2e-receipts
          TRACING_ENABLED: false

      - name: Install app dependencies
        run: |
          cd app
          npm ci

      - name: Install E2E dependencies
        run: |
          cd e2e
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: |
          cd e2e
          CI=true E2E_API_URL=http://localhost:8080 npm test
